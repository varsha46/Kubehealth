name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t varsha2721/kubehealth-backend:latest ./backend
          docker push varsha2721/kubehealth-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t varsha2721/kubehealth-frontend:latest ./frontend
          docker push varsha2721/kubehealth-frontend:latest

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials kubehealth-cluster \
          --zone=asia-south1-a \
          --project=varsha-proud-bauna

      - name: Deploy to GKE
        run: |
          kubectl rollout restart deployment frontend-deployment -n kubehealth
          kubectl rollout restart deployment backend-deployment -n kubehealth